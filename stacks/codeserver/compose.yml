services:
  code:
    image: gitpod/openvscode-server
    stdin_open: true
    tty: true
    init: true
    ports:
      - 25562:3000 # Editor
      - 25563:5173 # Dev
    volumes:
      # Persist workspace
      - workspace:/home/workspace
      # Persist user installations and config
      - home:/home/openvscode-server
      # Copy podman and compose from the host
      - /nix/store:/nix/store:ro
      - /run/current-system/sw/bin/podman:/usr/local/bin/podman
      - /run/current-system/sw/bin/podman-compose:/usr/local/bin/podman-compose
      # Host socket
      - /var/run/user/2001/podman/podman.sock:/var/run/user/1000/podman/podman.sock
volumes:
  workspace: null
  home: null